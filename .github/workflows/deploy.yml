name: Deploy OPP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "76.13.61.27 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIO0dnaoulC1nlI4Rm0iIaILcF4i7P2AmdCLyOxKjSwBr" >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: rsync -avz --delete -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" ./ root@76.13.61.27:/var/www/ourplanetproject.com/